    var previous;
    function unhide(divID) {
        var item = document.getElementById(divID);

        if (previous != null)
            previous.className='hidden';

        if (item) {
            item.className=(item.className=='hidden')?'unhidden':'hidden';
            previous = item;
        }
    }
</script>

	<p id="counterDisplay01"></p>


	<script>

	// ----------------------------
	class Countdown {
		constructor(startingNumber, element) {
			this.number = startingNumber;
			this.initialCount = startingNumber;
			this.timer = null;
			this.element = element;
			this.isPaused = false;
		}
		startCountdown() {
			this.timer = setInterval(() => {
				if (!this.isPaused) {
					this.number--;
					console.log(this.number);
				}
				this.displayCountdown();
				if (this.number === 0) {
					clearInterval(this.timer);
					this.element.textContent = "Countdown finished!";
					// Hide everything in the body except the element with id 'keepVisible'
					const keep = document.getElementById('keepVisible');
					const elems = document.body.querySelectorAll('*');
					elems.forEach(el => {
						if (keep && (el === keep || el.contains(keep))) return;
						el.classList.add('hidden');
					});
					
					const lost = document.getElementById('Fuck');
					if (lost) lost.classList.remove('hidden');
				}
			}, 1000);
		}
		displayCountdown() {
			this.element.textContent = this.number;
	
		}
		pause() {
			this.isPaused = true;
		}
		resume() {
			this.isPaused = false;
		}

		restart() {
			console.log("Reached restart()");
			this.number = this.initialCount;
			this.isPaused = false;
			clearInterval(this.timer);
			// Unhide all elements that were hidden, then restart the countdown
			document.querySelectorAll('.hidden').forEach(el => el.classList.remove('hidden'));
			this.startCountdown();
		}
	}
	// ----------------------------

	const counterDisplay01 = document.getElementById('counterDisplay01');

	const counter01 = new Countdown (16, counterDisplay01);

	counter01.startCountdown();

	</script>

	(function(){

		const obs = new MutationObserver(() => {
